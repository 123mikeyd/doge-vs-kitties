<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Public Domain Showdown — Artillery Brawl</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
#ui {
    position: absolute; top: 10px; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 0 20px; pointer-events: none; z-index: 10;
}
#wind-box {
    background: rgba(0,0,0,0.7); border: 2px solid #555; border-radius: 8px;
    padding: 8px 16px; color: #fff; font-size: 14px; text-align: center;
}
#turn-box {
    background: rgba(0,0,0,0.7); border: 2px solid #ffd700; border-radius: 8px;
    padding: 8px 16px; color: #ffd700; font-size: 16px; text-align: center;
    font-weight: bold;
}
#power-bar-container {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 20px; background: rgba(0,0,0,0.7);
    border: 2px solid #fff; border-radius: 10px; overflow: hidden;
    display: none; z-index: 10;
}
#power-bar {
    height: 100%; width: 0%; background: linear-gradient(90deg, #0f0, #ff0, #f00);
    transition: none;
}
#controls-help {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font-size: 12px; text-align: center;
    pointer-events: none; z-index: 10;
}
#game-over {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    display: none; z-index: 20; text-align: center;
}
#game-over h1 { font-size: 48px; margin-bottom: 20px; text-shadow: 0 0 20px currentColor; }
#game-over button {
    font-family: 'Courier New', monospace; font-size: 20px; padding: 10px 30px;
    border: 2px solid; border-radius: 8px; cursor: pointer;
    background: rgba(0,0,0,0.8); margin-top: 10px; pointer-events: all;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
    <div id="wind-box">Wind: <span id="wind-val">→ 0</span></div>
    <div id="turn-box"><span id="turn-label">DOGE TEAM</span> — <span id="timer">30</span>s</div>
    <div id="wind-box" style="visibility:hidden">spacer</div>
</div>
<div id="power-bar-container"><div id="power-bar"></div></div>
<div id="controls-help">A/D Move &nbsp;|&nbsp; W/S Aim &nbsp;|&nbsp; Space = Jump &nbsp;|&nbsp; Space×2 = Backflip &nbsp;|&nbsp; Click+Hold = Charge, Release = Fire &nbsp;|&nbsp; Enter = End Turn</div>
<div id="game-over">
    <h1 id="winner-text">DOGE WINS!</h1>
    <button id="restart-btn" onclick="initGame()">Play Again</button>
</div>

<script>
// ============================================================
// DOGE VS CRYPTO KITTIES — Artillery Showdown
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// CONSTANTS
// ============================================================
const GRAVITY = 400;
const MOVE_SPEED = 120;
const MOVE_BUDGET = 200; // pixels per turn
const TURN_TIME = 30; // seconds
const EXPLOSION_RADIUS = 40;
const EXPLOSION_DAMAGE = 35;
const WORM_RADIUS = 14;
const WATER_HEIGHT = 60;
const AIM_SPEED = 1.5; // radians per second
const MAX_LAUNCH_SPEED = 700;
const MIN_LAUNCH_SPEED = 150;
const JUMP_FORCE = 280;
const BACKFLIP_FORCE = 380;
const JUMP_FORWARD = 180;
const BACKFLIP_BACK = 80;

// ============================================================
// GAME STATE
// ============================================================
let terrain = []; // heightmap: terrain[x] = y of ground surface
let terrainCanvas = null; // offscreen canvas for pre-rendered terrain texture
let terrainCtx = null;
let teams = []; // [{name, color, accent, emoji, worms: [{x, y, hp, maxHp, alive}]}]
let currentTeam = 0;
let currentWorm = [0, 0]; // index per team
let aimAngle = -Math.PI / 4; // default aim up-left or up-right
let charging = false;
let chargeStart = 0;
let chargePower = 0;
let projectiles = [];
let explosions = []; // visual
let floatingTexts = [];
let turnTimer = TURN_TIME;
let moveUsed = 0;
let gameState = 'aiming'; // aiming, firing, waiting, postShot, aiTurn, gameOver
let hasFired = false; // track if player fired this turn
let postShotTimer = 0; // delay after explosion before turn ends
let postShotTarget = null; // worm that got hit (for camera zoom)
let wind = 0;
let isAI = [false, true]; // team 0 = player (doge), team 1 = AI (kitties)

// AI state
let aiPhase = 'idle'; // idle, thinking, aiming, charging, fired
let aiThinkTimer = 0;
let aiTargetAngle = 0;
let aiTargetPower = 0;
let aiChargeTimer = 0;
let keys = {};
let lastTime = 0;
let cameraPanX = 0; // for following projectiles
let cameraPanTarget = 0;
let shakeTimer = 0;
let shakeIntensity = 0;

// Jump state
let jumpVY = 0;
let jumpVX = 0;
let isAirborne = false;
let lastSpaceTime = 0;
const DOUBLE_TAP_MS = 300;
let facingDir = 1; // 1 = right, -1 = left

// Mouse aim + fire
let mouseX = 0;
let mouseY = 0;
let mouseDown = false;
let mouseChargeStart = 0;
let mousePower = 0;

// ============================================================
// TERRAIN GENERATION — Midpoint displacement fractal
// ============================================================
function generateTerrain() {
    terrain = [];
    const W = canvas.width;
    const H = canvas.height;
    const waterLine = H - WATER_HEIGHT;

    // === Midpoint Displacement (Diamond-Square 1D) ===
    // Start with endpoints, recursively subdivide with random offsets
    const points = {};
    const roughness = 0.65; // lower = smoother, higher = crazier
    const baseY = H * 0.45; // average ground height

    points[0] = baseY + (Math.random() - 0.5) * H * 0.15;
    points[W - 1] = baseY + (Math.random() - 0.5) * H * 0.15;

    function midpoint(left, right, spread) {
        if (right - left < 2) return;
        const mid = Math.floor((left + right) / 2);
        const avg = (points[left] + points[right]) / 2;
        points[mid] = avg + (Math.random() - 0.5) * spread;
        const newSpread = spread * roughness;
        midpoint(left, mid, newSpread);
        midpoint(mid, right, newSpread);
    }

    midpoint(0, W - 1, H * 0.3);

    // Fill in any gaps with linear interpolation
    let lastDefined = 0;
    for (let x = 0; x < W; x++) {
        if (points[x] !== undefined) {
            // Interpolate from lastDefined to x
            for (let ix = lastDefined + 1; ix < x; ix++) {
                const t = (ix - lastDefined) / (x - lastDefined);
                points[ix] = points[lastDefined] * (1 - t) + points[x] * t;
            }
            lastDefined = x;
        }
    }

    // === Add plateaus (flat sections for worms to stand on) ===
    const numPlateaus = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < numPlateaus; i++) {
        const px = Math.floor(W * 0.15 + Math.random() * W * 0.7);
        const pw = 40 + Math.floor(Math.random() * 80);
        const plateauY = points[px];
        for (let x = Math.max(0, px - pw / 2); x < Math.min(W, px + pw / 2); x++) {
            const blend = 1 - Math.pow(2 * Math.abs(x - px) / pw, 2);
            points[Math.floor(x)] = points[Math.floor(x)] * (1 - blend * 0.7) + plateauY * blend * 0.7;
        }
    }

    // === Add dramatic cliff faces ===
    const numCliffs = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < numCliffs; i++) {
        const cx = Math.floor(W * 0.25 + Math.random() * W * 0.5);
        const drop = (Math.random() > 0.5 ? 1 : -1) * (60 + Math.random() * 80);
        const steepness = 8 + Math.floor(Math.random() * 12);
        for (let x = cx; x < Math.min(W, cx + steepness); x++) {
            const t = (x - cx) / steepness;
            // Smooth step
            const s = t * t * (3 - 2 * t);
            points[x] = points[x] + drop * s;
        }
        // Continue at new height
        for (let x = cx + steepness; x < W; x++) {
            if (points[x] !== undefined) points[x] += drop;
        }
    }

    // === Add arches/caverns (concave dips) ===
    const numArches = Math.floor(Math.random() * 2);
    for (let i = 0; i < numArches; i++) {
        const ax = Math.floor(W * 0.2 + Math.random() * W * 0.6);
        const aw = 80 + Math.floor(Math.random() * 120);
        const depth = 40 + Math.random() * 60;
        for (let x = Math.max(0, ax - aw / 2); x < Math.min(W, ax + aw / 2); x++) {
            const t = 2 * (x - ax) / aw;
            const archShape = Math.sqrt(Math.max(0, 1 - t * t)); // semicircle
            points[Math.floor(x)] += depth * archShape;
        }
    }

    // === Clamp and smooth ===
    for (let x = 0; x < W; x++) {
        const val = points[x] !== undefined ? points[x] : baseY;
        // Keep terrain above water but allow some near-water areas
        terrain[x] = Math.min(waterLine - 15, Math.max(H * 0.15, val));
    }

    // Heavy smoothing — kill the pointy bits
    for (let pass = 0; pass < 12; pass++) {
        const smooth = [...terrain];
        const r = 4; // wider kernel = rounder hills
        for (let x = r; x < W - r; x++) {
            let sum = 0;
            for (let k = -r; k <= r; k++) sum += terrain[x + k];
            smooth[x] = sum / (r * 2 + 1);
        }
        for (let x = r; x < W - r; x++) terrain[x] = smooth[x];
    }
}

function destroyTerrain(cx, cy, radius) {
    // Update heightmap
    for (let x = Math.max(0, Math.floor(cx - radius)); x <= Math.min(terrain.length - 1, Math.ceil(cx + radius)); x++) {
        const dx = x - cx;
        const distFromCenter = Math.abs(dx);
        if (distFromCenter > radius) continue;
        const depth = Math.sqrt(radius * radius - dx * dx);
        const craterBottom = cy + depth;
        if (craterBottom > terrain[x]) {
            terrain[x] = craterBottom;
        }
    }

    // Punch hole in the terrain texture (slightly larger to catch grass edge)
    if (terrainCtx) {
        terrainCtx.save();
        terrainCtx.globalCompositeOperation = 'destination-out';
        terrainCtx.beginPath();
        terrainCtx.arc(cx, cy, radius + 8, 0, Math.PI * 2);
        terrainCtx.fill();
        terrainCtx.restore();
    }
}

// ============================================================
// TERRAIN TEXTURE — pre-rendered offscreen canvas
// ============================================================
function renderTerrainTexture() {
    const W = canvas.width;
    const H = canvas.height;

    terrainCanvas = document.createElement('canvas');
    terrainCanvas.width = W;
    terrainCanvas.height = H;
    terrainCtx = terrainCanvas.getContext('2d');

    // Fill the terrain shape
    terrainCtx.beginPath();
    terrainCtx.moveTo(0, H);
    for (let x = 0; x < terrain.length; x++) {
        terrainCtx.lineTo(x, terrain[x]);
    }
    terrainCtx.lineTo(terrain.length, H);
    terrainCtx.closePath();
    terrainCtx.clip(); // only draw inside terrain shape

    // Layer 1: Deep rock (bottom)
    const rockGrad = terrainCtx.createLinearGradient(0, H * 0.6, 0, H);
    rockGrad.addColorStop(0, '#5a4030');
    rockGrad.addColorStop(0.5, '#4a3525');
    rockGrad.addColorStop(1, '#3a2a1a');
    terrainCtx.fillStyle = rockGrad;
    terrainCtx.fillRect(0, 0, W, H);

    // Layer 2: Dirt (middle) — follows terrain contour
    for (let x = 0; x < W; x++) {
        const groundY = terrain[x];
        const dirtTop = groundY + 15;
        const dirtHeight = H - dirtTop;
        if (dirtHeight > 0) {
            // Slightly varied brown
            const shade = 60 + Math.sin(x * 0.05) * 10;
            terrainCtx.fillStyle = `rgb(${shade + 30}, ${shade - 10}, ${shade - 30})`;
            terrainCtx.fillRect(x, dirtTop, 1, dirtHeight);
        }
    }

    // Layer 3: Topsoil (just below grass)
    for (let x = 0; x < W; x++) {
        const groundY = terrain[x];
        terrainCtx.fillStyle = '#6b4a2a';
        terrainCtx.fillRect(x, groundY + 5, 1, 10);
    }

    // Layer 4: Green grass (top strip)
    for (let x = 0; x < W; x++) {
        const groundY = terrain[x];
        // Grass — varied green
        const g = 130 + Math.sin(x * 0.1) * 20 + Math.sin(x * 0.03) * 15;
        terrainCtx.fillStyle = `rgb(${40 + Math.sin(x*0.07)*10}, ${Math.floor(g)}, ${30 + Math.sin(x*0.09)*8})`;
        terrainCtx.fillRect(x, groundY, 1, 6);
        // Lighter grass highlight on very top
        terrainCtx.fillStyle = `rgb(${60 + Math.sin(x*0.13)*15}, ${Math.floor(g + 30)}, ${40})`;
        terrainCtx.fillRect(x, groundY, 1, 2);
    }

    // Layer 5: Random pebbles/rocks in the dirt
    terrainCtx.fillStyle = '#7a6a5a';
    for (let i = 0; i < 200; i++) {
        const rx = Math.random() * W;
        const groundY = terrain[Math.floor(rx)] || H * 0.5;
        const ry = groundY + 20 + Math.random() * (H - groundY - 80);
        const rw = 2 + Math.random() * 4;
        const rh = 1 + Math.random() * 3;
        terrainCtx.fillRect(rx, ry, rw, rh);
    }

    // Layer 6: Subtle horizontal dirt strata lines
    terrainCtx.strokeStyle = 'rgba(80, 60, 40, 0.3)';
    terrainCtx.lineWidth = 1;
    for (let sy = H * 0.4; sy < H; sy += 15 + Math.random() * 20) {
        terrainCtx.beginPath();
        for (let x = 0; x < W; x += 3) {
            const wobble = Math.sin(x * 0.02 + sy * 0.1) * 3;
            if (x === 0) terrainCtx.moveTo(x, sy + wobble);
            else terrainCtx.lineTo(x, sy + wobble);
        }
        terrainCtx.stroke();
    }
}

// ============================================================
// CHARACTER DEFINITIONS
// ============================================================
const CHARACTERS = {
    popeye:     { name: 'Popeye',      team: 0, color: '#2266cc', accent: '#1a4f99' },
    willie:     { name: 'S.Willie',    team: 0, color: '#333333', accent: '#1a1a1a' },
    peterpan:   { name: 'Peter Pan',   team: 0, color: '#22aa44', accent: '#188833' },
    pluto:      { name: 'Pluto',       team: 0, color: '#cc8833', accent: '#aa6622' },
    franken:    { name: 'Franken',     team: 1, color: '#447744', accent: '#2a552a' },
    dracula:    { name: 'Dracula',     team: 1, color: '#662244', accent: '#441133' },
    eviltigger: { name: 'Evil Tigger', team: 1, color: '#cc6600', accent: '#993300' },
    evilpooh:   { name: 'Evil Pooh',   team: 1, color: '#aa7722', accent: '#885511' },
};

// ============================================================
// CHARACTER SPRITE DRAWING
// ============================================================
function drawCharacter(ctx, x, y, charId, facing, t, isActive, isMoving) {
    const S = WORM_RADIUS; // base scale ~14px
    const bob = isMoving ? Math.sin(t * 12) * 2 : Math.sin(t * 2) * 0.5; // walk bob vs idle breathe
    ctx.save();
    ctx.translate(x, y + bob);
    ctx.scale(facing, 1); // flip for facing direction

    switch(charId) {
    case 'popeye': {
        // Sailor hat
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-6, -S-6, 12, 4);
        ctx.fillStyle = '#2266cc';
        ctx.fillRect(-4, -S-10, 8, 5);
        // Head
        ctx.fillStyle = '#f0c8a0';
        ctx.beginPath(); ctx.arc(0, -S+4, 7, 0, Math.PI*2); ctx.fill();
        // Squinty eye
        ctx.fillStyle = '#000';
        ctx.fillRect(2, -S+2, 3, 2);
        // Pipe
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(6, -S+6); ctx.lineTo(12, -S+3); ctx.lineTo(12, -S-1); ctx.stroke();
        // Body (sailor shirt)
        ctx.fillStyle = '#2266cc';
        ctx.fillRect(-6, -S+10, 12, 10);
        // Big forearm
        const armPump = Math.sin(t * 3) * 0.5;
        ctx.fillStyle = '#f0c8a0';
        ctx.beginPath(); ctx.ellipse(8, -S+8+armPump, 6, 4, 0.3, 0, Math.PI*2); ctx.fill();
        // Legs
        ctx.fillStyle = '#111';
        ctx.fillRect(-4, -S+20, 3, 6);
        ctx.fillRect(1, -S+20, 3, 6);
        break;
    }
    case 'willie': {
        // Steamboat Willie - black & white pie-eye mouse
        // Ears
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(-5, -S-4, 5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(5, -S-4, 5, 0, Math.PI*2); ctx.fill();
        // Head
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.arc(0, -S+4, 7, 0, Math.PI*2); ctx.fill();
        // Pie eyes (white circles with black dots)
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.ellipse(-3, -S+2, 3, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(3, -S+2, 3, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-2, -S+3, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(4, -S+3, 1.5, 0, Math.PI*2); ctx.fill();
        // Snout
        ctx.fillStyle = '#f0c8a0';
        ctx.beginPath(); ctx.ellipse(3, -S+7, 4, 2.5, 0, 0, Math.PI*2); ctx.fill();
        // Body
        ctx.fillStyle = '#222';
        ctx.fillRect(-5, -S+10, 10, 10);
        // Buttons
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(0, -S+13, 1.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(0, -S+17, 1.2, 0, Math.PI*2); ctx.fill();
        // Legs (shorts)
        ctx.fillStyle = '#444';
        const legAnim = isMoving ? Math.sin(t*14)*3 : 0;
        ctx.fillRect(-4, -S+20, 3, 6+legAnim);
        ctx.fillRect(1, -S+20, 3, 6-legAnim);
        // Shoes
        ctx.fillStyle = '#cc8800';
        ctx.fillRect(-5, -S+26+legAnim, 4, 2);
        ctx.fillRect(0, -S+26-legAnim, 4, 2);
        break;
    }
    case 'peterpan': {
        // Hat (triangle with feather)
        ctx.fillStyle = '#22aa44';
        ctx.beginPath(); ctx.moveTo(0, -S-12); ctx.lineTo(-7, -S-1); ctx.lineTo(7, -S-1); ctx.closePath(); ctx.fill();
        // Feather
        ctx.strokeStyle = '#ff4444';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(3, -S-10); ctx.quadraticCurveTo(10, -S-15, 8, -S-6); ctx.stroke();
        // Head
        ctx.fillStyle = '#f0c8a0';
        ctx.beginPath(); ctx.arc(0, -S+4, 6, 0, Math.PI*2); ctx.fill();
        // Smirk
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(0, -S+5, 3, 0.1, Math.PI-0.1); ctx.stroke();
        // Eyes
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-2, -S+2, 1, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(3, -S+2, 1, 0, Math.PI*2); ctx.fill();
        // Tunic
        ctx.fillStyle = '#22aa44';
        ctx.beginPath(); ctx.moveTo(-7, -S+9); ctx.lineTo(7, -S+9); ctx.lineTo(5, -S+22); ctx.lineTo(-5, -S+22); ctx.closePath(); ctx.fill();
        // Belt
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-6, -S+14, 12, 2);
        // Legs (tights)
        ctx.fillStyle = '#33bb55';
        ctx.fillRect(-3, -S+22, 2, 5);
        ctx.fillRect(1, -S+22, 2, 5);
        break;
    }
    case 'pluto': {
        // Pluto - four-legged dog, drawn from side
        const legCycle = isMoving ? Math.sin(t*14)*4 : 0;
        // Body (horizontal oval)
        ctx.fillStyle = '#cc8833';
        ctx.beginPath(); ctx.ellipse(0, -S+8, 10, 6, 0, 0, Math.PI*2); ctx.fill();
        // Head
        ctx.fillStyle = '#cc8833';
        ctx.beginPath(); ctx.arc(9, -S+2, 6, 0, Math.PI*2); ctx.fill();
        // Ear (floppy)
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.ellipse(12, -S+1, 3, 6, 0.3, 0, Math.PI*2); ctx.fill();
        // Eye
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(10, -S, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(10.5, -S+0.5, 1.2, 0, Math.PI*2); ctx.fill();
        // Nose
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.ellipse(14, -S+3, 2, 1.5, 0, 0, Math.PI*2); ctx.fill();
        // Tongue
        ctx.fillStyle = '#ee4466';
        ctx.beginPath(); ctx.ellipse(13, -S+6, 1.5, 2, 0.2, 0, Math.PI*2); ctx.fill();
        // Legs (4 legs)
        ctx.fillStyle = '#cc8833';
        ctx.fillRect(-7, -S+13, 3, 7+legCycle);
        ctx.fillRect(-3, -S+13, 3, 7-legCycle);
        ctx.fillRect(3, -S+13, 3, 7-legCycle);
        ctx.fillRect(7, -S+13, 3, 7+legCycle);
        // Tail
        const tailWag = Math.sin(t*8)*0.4;
        ctx.strokeStyle = '#cc8833'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-9, -S+5);
        ctx.quadraticCurveTo(-14, -S-5+tailWag*10, -11, -S-2); ctx.stroke();
        break;
    }
    case 'franken': {
        // Flat top head
        ctx.fillStyle = '#558855';
        ctx.fillRect(-7, -S-6, 14, 6);
        // Head
        ctx.fillStyle = '#669966';
        ctx.beginPath(); ctx.arc(0, -S+4, 7, 0, Math.PI*2); ctx.fill();
        ctx.fillRect(-7, -S-2, 14, 6);
        // Bolts
        ctx.fillStyle = '#888';
        ctx.fillRect(-10, -S+2, 4, 3);
        ctx.fillRect(6, -S+2, 4, 3);
        // Stitches on forehead
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(-3, -S-2); ctx.lineTo(-3, -S+2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(3, -S-2); ctx.lineTo(3, -S+2); ctx.stroke();
        // Eyes (sunken)
        ctx.fillStyle = '#000';
        ctx.fillRect(-4, -S+1, 3, 3);
        ctx.fillRect(1, -S+1, 3, 3);
        ctx.fillStyle = '#ff3300';
        ctx.beginPath(); ctx.arc(-2.5, -S+2.5, 0.8, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(2.5, -S+2.5, 0.8, 0, Math.PI*2); ctx.fill();
        // Mouth (grim line)
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(-4, -S+8); ctx.lineTo(4, -S+8); ctx.stroke();
        // Massive body
        ctx.fillStyle = '#334433';
        ctx.fillRect(-8, -S+10, 16, 14);
        // Legs
        ctx.fillStyle = '#222';
        ctx.fillRect(-5, -S+24, 4, 5);
        ctx.fillRect(1, -S+24, 4, 5);
        break;
    }
    case 'dracula': {
        // Cape (behind)
        ctx.fillStyle = '#440022';
        ctx.beginPath(); ctx.moveTo(-10, -S+2); ctx.lineTo(10, -S+2);
        ctx.lineTo(12, -S+28); ctx.lineTo(-12, -S+28); ctx.closePath(); ctx.fill();
        // Cape inner lining
        ctx.fillStyle = '#880033';
        ctx.beginPath(); ctx.moveTo(-7, -S+5); ctx.lineTo(7, -S+5);
        ctx.lineTo(8, -S+25); ctx.lineTo(-8, -S+25); ctx.closePath(); ctx.fill();
        // Head
        ctx.fillStyle = '#ddd8cc';
        ctx.beginPath(); ctx.arc(0, -S+4, 6, 0, Math.PI*2); ctx.fill();
        // Widow's peak hair
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.moveTo(-6, -S); ctx.lineTo(0, -S+2); ctx.lineTo(6, -S);
        ctx.lineTo(6, -S-5); ctx.lineTo(0, -S-7); ctx.lineTo(-6, -S-5); ctx.closePath(); ctx.fill();
        // Red eyes
        ctx.fillStyle = '#ff0000';
        ctx.beginPath(); ctx.arc(-2, -S+3, 1.3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(3, -S+3, 1.3, 0, Math.PI*2); ctx.fill();
        // Fangs
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.moveTo(-2, -S+8); ctx.lineTo(-1, -S+11); ctx.lineTo(0, -S+8); ctx.fill();
        ctx.beginPath(); ctx.moveTo(1, -S+8); ctx.lineTo(2, -S+11); ctx.lineTo(3, -S+8); ctx.fill();
        // Body (suit)
        ctx.fillStyle = '#111';
        ctx.fillRect(-5, -S+10, 10, 12);
        // Shirt front
        ctx.fillStyle = '#fff';
        ctx.fillRect(-1, -S+10, 2, 8);
        // Legs
        ctx.fillStyle = '#111';
        ctx.fillRect(-4, -S+22, 3, 6);
        ctx.fillRect(1, -S+22, 3, 6);
        break;
    }
    case 'eviltigger': {
        // Evil Tigger — slashed stripes, manic eyes
        // Body (spring-loaded, slightly crouched)
        const springBob = isMoving ? Math.abs(Math.sin(t*16))*3 : 0;
        ctx.fillStyle = '#cc6600';
        ctx.beginPath(); ctx.ellipse(0, -S+8-springBob, 7, 9, 0, 0, Math.PI*2); ctx.fill();
        // Dark stripes
        ctx.strokeStyle = '#331100'; ctx.lineWidth = 2;
        for (let i = -2; i <= 2; i++) {
            ctx.beginPath(); ctx.moveTo(i*3-1, -S+2-springBob); ctx.lineTo(i*3+1, -S+14-springBob); ctx.stroke();
        }
        // Head
        ctx.fillStyle = '#dd7711';
        ctx.beginPath(); ctx.arc(0, -S+0, 7, 0, Math.PI*2); ctx.fill();
        // Ears (pointy)
        ctx.fillStyle = '#cc6600';
        ctx.beginPath(); ctx.moveTo(-5, -S-4); ctx.lineTo(-7, -S-10); ctx.lineTo(-1, -S-4); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(5, -S-4); ctx.lineTo(7, -S-10); ctx.lineTo(1, -S-4); ctx.closePath(); ctx.fill();
        // MANIC eyes (red, wide)
        ctx.fillStyle = '#ff0000';
        ctx.beginPath(); ctx.arc(-3, -S-1, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(3, -S-1, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-3, -S-1, 1, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(3, -S-1, 1, 0, Math.PI*2); ctx.fill();
        // Manic grin
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, -S+2, 4, 0.2, Math.PI-0.2); ctx.stroke();
        // Scar across face
        ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(-5, -S-3); ctx.lineTo(5, -S+4); ctx.stroke();
        // Tail (spring-like)
        ctx.strokeStyle = '#cc6600'; ctx.lineWidth = 3;
        const tailT = Math.sin(t*6)*0.5;
        ctx.beginPath(); ctx.moveTo(-6, -S+10-springBob);
        ctx.bezierCurveTo(-14, -S+5+tailT*8, -10, -S-5, -8, -S-2); ctx.stroke();
        // Legs
        ctx.fillStyle = '#cc6600';
        ctx.fillRect(-4, -S+16-springBob, 3, 5+springBob);
        ctx.fillRect(1, -S+16-springBob, 3, 5+springBob);
        break;
    }
    case 'evilpooh': {
        // Evil Pooh — honey-crazed, red eyes, dripping
        // Body (round bear)
        ctx.fillStyle = '#aa7722';
        ctx.beginPath(); ctx.ellipse(0, -S+10, 8, 9, 0, 0, Math.PI*2); ctx.fill();
        // Dark red tattered shirt
        ctx.fillStyle = '#880000';
        ctx.fillRect(-6, -S+5, 12, 8);
        ctx.fillStyle = '#660000';
        // Rips in shirt
        ctx.fillRect(-6, -S+8, 2, 5);
        ctx.fillRect(4, -S+6, 2, 4);
        // Head
        ctx.fillStyle = '#bb8833';
        ctx.beginPath(); ctx.arc(0, -S+2, 7, 0, Math.PI*2); ctx.fill();
        // Small round ears
        ctx.fillStyle = '#996622';
        ctx.beginPath(); ctx.arc(-6, -S-3, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(6, -S-3, 3, 0, Math.PI*2); ctx.fill();
        // RED GLOWING EYES
        ctx.fillStyle = '#ff0000';
        ctx.beginPath(); ctx.arc(-3, -S+1, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(3, -S+1, 2, 0, Math.PI*2); ctx.fill();
        // Glow effect
        ctx.fillStyle = `rgba(255,0,0,${0.3+Math.sin(t*4)*0.15})`;
        ctx.beginPath(); ctx.arc(-3, -S+1, 4, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(3, -S+1, 4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-3, -S+1, 0.8, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(3, -S+1, 0.8, 0, Math.PI*2); ctx.fill();
        // Snout + grimace
        ctx.fillStyle = '#cc9944';
        ctx.beginPath(); ctx.ellipse(0, -S+5, 3, 2, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(-3, -S+7); ctx.quadraticCurveTo(0, -S+9, 3, -S+7); ctx.stroke();
        // Honey dripping from mouth
        ctx.fillStyle = '#ddaa00';
        const drip = Math.sin(t*3)*2;
        ctx.beginPath(); ctx.ellipse(-1, -S+9+drip, 1.5, 3, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(2, -S+10+drip*0.7, 1, 2, 0, 0, Math.PI*2); ctx.fill();
        // Legs
        ctx.fillStyle = '#aa7722';
        ctx.fillRect(-4, -S+18, 3, 6);
        ctx.fillRect(1, -S+18, 3, 6);
        break;
    }
    }
    ctx.restore();
}

// ============================================================
// TEAM SETUP
// ============================================================
function createTeams() {
    const W = canvas.width;

    const heroChars = ['popeye', 'willie', 'peterpan', 'pluto'];
    const villainChars = ['franken', 'dracula', 'eviltigger', 'evilpooh'];

    const heroWorms = heroChars.map((id, i) => ({
        x: Math.floor(W * 0.05 + (W * 0.3) * (i / (heroChars.length - 1))),
        y: 0, hp: 100, maxHp: 100, alive: true,
        name: CHARACTERS[id].name, charId: id
    }));

    const villainWorms = villainChars.map((id, i) => ({
        x: Math.floor(W * 0.65 + (W * 0.3) * (i / (villainChars.length - 1))),
        y: 0, hp: 100, maxHp: 100, alive: true,
        name: CHARACTERS[id].name, charId: id
    }));

    // Drop onto terrain
    [...heroWorms, ...villainWorms].forEach(w => {
        w.y = terrain[Math.floor(w.x)] - WORM_RADIUS;
    });

    teams = [
        { name: 'HEROES', color: '#44aaff', accent: '#2277cc', worms: heroWorms },
        { name: 'VILLAINS', color: '#ff4444', accent: '#cc2222', worms: villainWorms }
    ];
    currentTeam = 0;
    currentWorm = [0, 0];
}

// ============================================================
// ACTIVE WORM HELPER
// ============================================================
function getActiveWorm() {
    const team = teams[currentTeam];
    if (!team) return null;
    // Find next alive worm starting from current index
    const start = currentWorm[currentTeam];
    for (let i = 0; i < team.worms.length; i++) {
        const idx = (start + i) % team.worms.length;
        if (team.worms[idx].alive) {
            currentWorm[currentTeam] = idx;
            return team.worms[idx];
        }
    }
    return null;
}

// ============================================================
// WIND
// ============================================================
function randomizeWind() {
    wind = (Math.random() - 0.5) * 200;
}

function updateWindUI() {
    const el = document.getElementById('wind-val');
    const arrow = wind > 5 ? '→' : wind < -5 ? '←' : '·';
    const strength = Math.abs(wind).toFixed(0);
    el.textContent = `${arrow} ${strength}`;
}

// ============================================================
// TURN MANAGEMENT
// ============================================================
function startTurn() {
    turnTimer = TURN_TIME;
    moveUsed = 0;
    charging = false;
    chargePower = 0;
    hasFired = false;
    isAirborne = false;
    jumpVY = 0;
    jumpVX = 0;
    mouseDown = false;
    mousePower = 0;
    postShotTimer = 0;
    postShotTarget = null;
    aiPhase = 'idle';
    aiThinkTimer = 0;
    document.getElementById('power-bar-container').style.display = 'none';
    randomizeWind();
    updateWindUI();

    // Set aim direction based on team side
    const worm = getActiveWorm();
    if (worm) {
        aimAngle = currentTeam === 0 ? -Math.PI / 4 : -3 * Math.PI / 4;
        cameraPanTarget = worm.x - canvas.width / 2;
    }

    const wormForLabel = getActiveWorm();
    const charName = wormForLabel ? wormForLabel.name : '';
    const label = document.getElementById('turn-label');
    label.textContent = `${teams[currentTeam].name} — ${charName}`;
    label.style.color = teams[currentTeam].color;
    document.getElementById('turn-box').style.borderColor = teams[currentTeam].color;

    // Start AI or player turn
    if (isAI[currentTeam]) {
        gameState = 'aiTurn';
        aiPhase = 'thinking';
        aiThinkTimer = 0.8 + Math.random() * 0.5; // brief "thinking" pause
    } else {
        gameState = 'aiming';
    }
}

function endTurn() {
    if (gameState === 'firing') return;

    // Advance to next alive worm for this team
    const team = teams[currentTeam];
    let nextIdx = (currentWorm[currentTeam] + 1) % team.worms.length;
    currentWorm[currentTeam] = nextIdx;

    // Switch team
    currentTeam = (currentTeam + 1) % 2;

    // Check if next team has alive worms
    if (!teams[currentTeam].worms.some(w => w.alive)) {
        gameOver();
        return;
    }

    startTurn();
}

function gameOver() {
    gameState = 'gameOver';
    const winnerIdx = teams[0].worms.some(w => w.alive) ? 0 : 1;
    const el = document.getElementById('game-over');
    const txt = document.getElementById('winner-text');
    txt.textContent = `${teams[winnerIdx].name} WIN!`;
    txt.style.color = teams[winnerIdx].color;
    const btn = document.getElementById('restart-btn');
    btn.style.color = teams[winnerIdx].color;
    btn.style.borderColor = teams[winnerIdx].color;
    el.style.display = 'block';
}

// ============================================================
// PROJECTILE / EXPLOSION
// ============================================================
function fireProjectile(x, y, angle, power) {
    const speed = MIN_LAUNCH_SPEED + power * (MAX_LAUNCH_SPEED - MIN_LAUNCH_SPEED);
    projectiles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        team: currentTeam,
        alive: true,
        trail: []
    });
    gameState = 'firing';
    hasFired = true;
    playSound('fire');
}

function createExplosion(x, y, radius) {
    explosions.push({ x, y, radius, maxRadius: radius, timer: 0, maxTime: 0.4 });
    destroyTerrain(x, y, radius);
    shakeTimer = 0.3;
    shakeIntensity = 8;
    playSound('explode');

    // Damage and push worms
    for (const team of teams) {
        for (const worm of team.worms) {
            if (!worm.alive) continue;
            const dx = worm.x - x;
            const dy = worm.y - y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < radius + WORM_RADIUS) {
                const dmgMult = 1 - Math.min(1, dist / (radius + WORM_RADIUS));
                const damage = Math.round(EXPLOSION_DAMAGE * (0.3 + 0.7 * dmgMult));
                worm.hp -= damage;
                spawnFloatingText(worm.x, worm.y - 30, `-${damage}`, '#ff4444');

                // Knockback
                if (dist > 0) {
                    const pushForce = 120 * dmgMult;
                    worm.x += (dx / dist) * pushForce;
                    worm.y += (dy / dist) * pushForce * 0.5;
                }

                // Track hit worm for camera zoom
                postShotTarget = worm;

                if (worm.hp <= 0) {
                    worm.hp = 0;
                    worm.alive = false;
                    spawnFloatingText(worm.x, worm.y - 50, 'KO!', '#ffd700');
                    playSound('ko');
                }
            }
        }
    }
}

// ============================================================
// FLOATING TEXT
// ============================================================
function spawnFloatingText(x, y, text, color) {
    floatingTexts.push({ x, y, text, color, timer: 0, maxTime: 1.5 });
}

// ============================================================
// SOUND (Web Audio)
// ============================================================
let audioCtx = null;
function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function playSound(type) {
    try {
        const ctx = getAudio();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'fire') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, t);
            osc.frequency.linearRampToValueAtTime(100, t + 0.15);
            gain.gain.setValueAtTime(0.15, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.2);
            osc.start(t); osc.stop(t + 0.2);
        } else if (type === 'explode') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, t);
            osc.frequency.linearRampToValueAtTime(30, t + 0.4);
            gain.gain.setValueAtTime(0.25, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        } else if (type === 'ko') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(600, t);
            osc.frequency.linearRampToValueAtTime(200, t + 0.3);
            gain.gain.setValueAtTime(0.12, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.3);
            osc.start(t); osc.stop(t + 0.3);
        }
    } catch (e) { /* audio not available */ }
}

// ============================================================
// INPUT — WASD + Space Jump + Mouse Aim/Fire
// ============================================================
window.addEventListener('keydown', e => {
    keys[e.code] = true;

    // SPACE = Jump / Double-tap = Backflip
    if (e.code === 'Space' && gameState === 'aiming' && !mouseDown) {
        const now = performance.now();
        const timeSinceLast = now - lastSpaceTime;
        const worm = getActiveWorm();
        if (worm) {
            if (timeSinceLast < DOUBLE_TAP_MS && isAirborne) {
                // BACKFLIP — override the initial jump mid-air
                jumpVY = -BACKFLIP_FORCE;
                jumpVX = -facingDir * BACKFLIP_BACK;
                playSound('fire');
            } else if (!isAirborne) {
                // Normal jump — up and forward at ~55 degrees
                jumpVY = -JUMP_FORCE;
                jumpVX = facingDir * JUMP_FORWARD;
                isAirborne = true;
            }
        }
        lastSpaceTime = now;
        e.preventDefault();
    }

    // ENTER = End turn
    if (e.code === 'Enter' && gameState === 'aiming') {
        endTurn();
        e.preventDefault();
    }

    // Track facing direction from A/D
    if (e.code === 'KeyA') facingDir = -1;
    if (e.code === 'KeyD') facingDir = 1;
});
window.addEventListener('keyup', e => {
    keys[e.code] = false;
});

// Mouse — click+hold to charge power, release to fire at current aim angle
canvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (gameState !== 'aiming') return;
    if (isAirborne) return;
    mouseDown = true;
    mouseChargeStart = performance.now();
    mousePower = 0;
    document.getElementById('power-bar-container').style.display = 'block';
    e.preventDefault();
});
canvas.addEventListener('mouseup', e => {
    if (e.button !== 0) return;
    if (!mouseDown) return;
    mouseDown = false;

    if (gameState === 'aiming') {
        const worm = getActiveWorm();
        if (worm) {
            fireProjectile(worm.x, worm.y - 5, aimAngle, mousePower);
        }
    }
    mousePower = 0;
    document.getElementById('power-bar-container').style.display = 'none';
    e.preventDefault();
});
// Prevent context menu on right click
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
    if (gameState === 'gameOver') return;

    const worm = getActiveWorm();
    if (!worm) { endTurn(); return; }

    document.getElementById('timer').textContent = Math.ceil(Math.max(0, turnTimer));

    // A/D Movement (only when grounded and not charging)
    if (gameState === 'aiming' && !isAirborne && !mouseDown) {
        let moved = 0;
        if (keys['KeyA'] && moveUsed < MOVE_BUDGET) {
            worm.x -= MOVE_SPEED * dt;
            moved = MOVE_SPEED * dt;
        }
        if (keys['KeyD'] && moveUsed < MOVE_BUDGET) {
            worm.x += MOVE_SPEED * dt;
            moved = MOVE_SPEED * dt;
        }
        if (moved > 0) {
            moveUsed += moved;
            // Snap to terrain
            const tx = Math.floor(Math.max(0, Math.min(terrain.length - 1, worm.x)));
            worm.y = terrain[tx] - WORM_RADIUS;
        }
    }

    // W/S Aim — rotate crosshair around the worm (full 360)
    if (gameState === 'aiming') {
        if (keys['KeyW']) aimAngle -= AIM_SPEED * dt;
        if (keys['KeyS']) aimAngle += AIM_SPEED * dt;
        // Wrap angle to keep it in -PI to PI range
        if (aimAngle > Math.PI) aimAngle -= Math.PI * 2;
        if (aimAngle < -Math.PI) aimAngle += Math.PI * 2;
    }

    // Jump physics (airborne)
    if (isAirborne && worm) {
        jumpVY += GRAVITY * dt;
        worm.x += jumpVX * dt;
        worm.y += jumpVY * dt;

        // Clamp X
        worm.x = Math.max(WORM_RADIUS, Math.min(terrain.length - WORM_RADIUS, worm.x));

        // Land on terrain
        const tx = Math.floor(Math.max(0, Math.min(terrain.length - 1, worm.x)));
        const groundY = terrain[tx] - WORM_RADIUS;
        if (worm.y >= groundY && jumpVY > 0) {
            worm.y = groundY;
            isAirborne = false;
            jumpVY = 0;
            jumpVX = 0;
            moveUsed += 30; // jumping costs some move budget
        }
    }

    // Mouse charge power
    if (mouseDown) {
        mousePower = Math.min(1, (performance.now() - mouseChargeStart) / 2000);
        document.getElementById('power-bar').style.width = (mousePower * 100) + '%';
    }

    // ============================================================
    // AI TURN LOGIC (Kitties)
    // ============================================================
    if (gameState === 'aiTurn' && worm) {
        if (aiPhase === 'thinking') {
            // Brief pause — "thinking"
            aiThinkTimer -= dt;
            if (aiThinkTimer <= 0) {
                // Pick a target: nearest alive enemy worm
                let bestTarget = null;
                let bestDist = Infinity;
                const enemyTeamIdx = (currentTeam + 1) % 2;
                for (const ew of teams[enemyTeamIdx].worms) {
                    if (!ew.alive) continue;
                    const d = Math.abs(ew.x - worm.x);
                    if (d < bestDist) { bestDist = d; bestTarget = ew; }
                }

                if (bestTarget) {
                    // Calculate firing solution with some inaccuracy
                    const dx = bestTarget.x - worm.x;
                    const dy = bestTarget.y - worm.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    // Estimate angle and power using projectile physics
                    // Simple approach: aim at target with gravity compensation
                    const targetSpeed = MIN_LAUNCH_SPEED + 0.6 * (MAX_LAUNCH_SPEED - MIN_LAUNCH_SPEED);
                    const t = dist / targetSpeed; // rough time of flight
                    const compensatedDY = dy - 0.5 * GRAVITY * t * t; // compensate for gravity drop
                    const compensatedDX = dx - wind * t * 0.5; // compensate for wind

                    aiTargetAngle = Math.atan2(compensatedDY, compensatedDX);
                    aiTargetPower = Math.min(0.9, Math.max(0.3, dist / 800));

                    // Add inaccuracy (AI isn't perfect)
                    aiTargetAngle += (Math.random() - 0.5) * 0.15;
                    aiTargetPower += (Math.random() - 0.5) * 0.12;
                    aiTargetPower = Math.max(0.2, Math.min(1, aiTargetPower));
                } else {
                    // No target, fire randomly
                    aiTargetAngle = -Math.PI / 4 + (Math.random() - 0.5) * 0.5;
                    aiTargetPower = 0.5;
                }

                aiPhase = 'aiming';
                aiThinkTimer = 0;
            }
        }

        if (aiPhase === 'aiming') {
            // Smoothly rotate toward target angle
            const angleDiff = aiTargetAngle - aimAngle;
            const rotateSpeed = 1.8;
            if (Math.abs(angleDiff) > 0.02) {
                aimAngle += Math.sign(angleDiff) * rotateSpeed * dt;
            } else {
                aimAngle = aiTargetAngle;
                aiPhase = 'charging';
                aiChargeTimer = 0;
            }
        }

        if (aiPhase === 'charging') {
            // Charge up to target power
            aiChargeTimer += dt;
            const chargeTime = aiTargetPower * 2; // power 0-1 maps to 0-2 seconds
            mousePower = Math.min(aiTargetPower, aiChargeTimer / 2);
            document.getElementById('power-bar-container').style.display = 'block';
            document.getElementById('power-bar').style.width = (mousePower * 100) + '%';

            if (aiChargeTimer >= chargeTime) {
                // FIRE!
                fireProjectile(worm.x, worm.y - 5, aimAngle, aiTargetPower);
                aiPhase = 'fired';
                document.getElementById('power-bar-container').style.display = 'none';
            }
        }
    }

    // Camera follow
    if (projectiles.length > 0) {
        cameraPanTarget = projectiles[0].x - canvas.width / 2;
    } else if (worm) {
        cameraPanTarget = worm.x - canvas.width / 2;
    }
    cameraPanTarget = Math.max(0, Math.min(terrain.length - canvas.width, cameraPanTarget));
    cameraPanX += (cameraPanTarget - cameraPanX) * 3 * dt;

    // Projectiles
    for (const p of projectiles) {
        if (!p.alive) continue;
        p.trail.push({ x: p.x, y: p.y });
        if (p.trail.length > 20) p.trail.shift();

        p.vx += wind * dt;
        p.vy += GRAVITY * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;

        // Ground collision
        const tx = Math.floor(p.x);
        if (tx >= 0 && tx < terrain.length && p.y >= terrain[tx]) {
            createExplosion(p.x, p.y, EXPLOSION_RADIUS);
            p.alive = false;
        }

        // Out of bounds
        if (p.x < -100 || p.x > terrain.length + 100 || p.y > canvas.height + 100) {
            p.alive = false;
        }
    }

    // Clean dead projectiles
    const hadProjectiles = projectiles.length > 0;
    projectiles = projectiles.filter(p => p.alive);
    if (hadProjectiles && projectiles.length === 0 && gameState === 'firing') {
        // Projectile landed — enter post-shot phase
        gameState = 'postShot';
        postShotTimer = 1.2; // 1.2 seconds of pause (camera zoom on hit, damage settle)
        settleWorms();

        // Check for game over
        for (const team of teams) {
            if (!team.worms.some(w => w.alive)) {
                setTimeout(() => gameOver(), 800);
                return;
            }
        }
    }

    // Post-shot countdown — camera lingers, then turn ends
    if (gameState === 'postShot') {
        postShotTimer -= dt;
        // Camera zoom toward last explosion or hit worm
        if (postShotTarget) {
            cameraPanTarget = postShotTarget.x - canvas.width / 2;
        }
        if (postShotTimer <= 0) {
            gameState = 'aiming'; // allow endTurn to proceed
            endTurn();
        }
    }

    // Timer-based forced turn end (always ticking during aiming/aiTurn)
    if (gameState === 'aiming' || gameState === 'aiTurn') {
        turnTimer -= dt;
        if (turnTimer <= 0) {
            turnTimer = 0;
            // Force fire if charging
            if (mouseDown) {
                mouseDown = false;
                const w = getActiveWorm();
                if (w) fireProjectile(w.x, w.y - 5, aimAngle, mousePower);
                mousePower = 0;
                document.getElementById('power-bar-container').style.display = 'none';
            } else if (!hasFired) {
                // Didn't fire — just end the turn
                endTurn();
            }
            // If already fired, the postShot handler will end the turn
        }
    }

    // Explosions
    for (const ex of explosions) {
        ex.timer += dt;
    }
    explosions = explosions.filter(e => e.timer < e.maxTime);

    // Floating text
    for (const ft of floatingTexts) {
        ft.timer += dt;
        ft.y -= 40 * dt;
    }
    floatingTexts = floatingTexts.filter(ft => ft.timer < ft.maxTime);

    // Screen shake
    if (shakeTimer > 0) shakeTimer -= dt;

    // Water death check
    for (const team of teams) {
        for (const worm of team.worms) {
            if (!worm.alive) continue;
            if (worm.y > canvas.height - WATER_HEIGHT + 10) {
                worm.alive = false;
                worm.hp = 0;
                spawnFloatingText(worm.x, worm.y - 40, 'SPLASH!', '#44aaff');
                playSound('ko');
            }
        }
    }
}

function settleWorms() {
    for (const team of teams) {
        for (const worm of team.worms) {
            if (!worm.alive) continue;
            const tx = Math.floor(Math.max(0, Math.min(terrain.length - 1, worm.x)));
            const groundY = terrain[tx] - WORM_RADIUS;
            if (worm.y < groundY) {
                worm.y = groundY; // drop onto new terrain
            }
        }
    }
}

// ============================================================
// DRAW
// ============================================================
function draw() {
    const W = canvas.width;
    const H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // Camera + shake
    ctx.save();
    let shakeX = 0, shakeY = 0;
    if (shakeTimer > 0) {
        shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
        shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
    }
    ctx.translate(-cameraPanX + shakeX, shakeY);

    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#0a0a2e');
    skyGrad.addColorStop(0.5, '#1a1a4e');
    skyGrad.addColorStop(1, '#2a1a3e');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(cameraPanX, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (let i = 0; i < 80; i++) {
        const sx = ((i * 137.5) % W + cameraPanX * 0.1) % (W + 200) - 100 + cameraPanX;
        const sy = (i * 97.3) % (H * 0.5);
        ctx.fillRect(sx, sy, 1.5, 1.5);
    }

    // Terrain — pre-rendered texture (explosions punch holes in it)
    if (terrainCanvas) {
        ctx.drawImage(terrainCanvas, 0, 0);
    }

    // Water
    const waterY = H - WATER_HEIGHT;
    ctx.fillStyle = 'rgba(30, 100, 200, 0.6)';
    ctx.fillRect(cameraPanX, waterY, W, WATER_HEIGHT);
    ctx.fillStyle = 'rgba(60, 140, 255, 0.3)';
    ctx.fillRect(cameraPanX, waterY, W, 8);

    // Projectile trails
    for (const p of projectiles) {
        if (p.trail.length > 1) {
            ctx.beginPath();
            ctx.moveTo(p.trail[0].x, p.trail[0].y);
            for (let i = 1; i < p.trail.length; i++) {
                ctx.lineTo(p.trail[i].x, p.trail[i].y);
            }
            ctx.strokeStyle = 'rgba(255, 200, 50, 0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }

    // Projectiles
    for (const p of projectiles) {
        if (!p.alive) continue;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#ffd700';
        ctx.fill();
        ctx.strokeStyle = '#ff8800';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    // Explosions
    for (const ex of explosions) {
        const progress = ex.timer / ex.maxTime;
        const r = ex.maxRadius * (0.5 + progress * 0.5);
        const alpha = 1 - progress;
        // Fireball
        ctx.beginPath();
        ctx.arc(ex.x, ex.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, ${Math.floor(150 * (1 - progress))}, 0, ${alpha * 0.6})`;
        ctx.fill();
        // Flash
        ctx.beginPath();
        ctx.arc(ex.x, ex.y, r * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 200, ${alpha * 0.8})`;
        ctx.fill();
    }

    // Characters
    const now = performance.now() / 1000;
    for (let ti = 0; ti < teams.length; ti++) {
        const team = teams[ti];
        for (let wi = 0; wi < team.worms.length; wi++) {
            const w = team.worms[wi];
            if (!w.alive) continue;

            const isActive = (ti === currentTeam && wi === currentWorm[currentTeam] &&
                (gameState === 'aiming' || gameState === 'aiTurn'));
            const isCurrentlyMoving = isActive && (keys['KeyA'] || keys['KeyD']) && !isAirborne;
            const charFacing = isActive ? facingDir : (ti === 0 ? 1 : -1);

            // Draw character sprite
            drawCharacter(ctx, w.x, w.y, w.charId, charFacing, now, isActive, isCurrentlyMoving);

            // Name
            ctx.font = 'bold 9px Courier New';
            ctx.fillStyle = isActive ? '#fff' : team.color;
            ctx.textAlign = 'center';
            ctx.fillText(w.name, w.x, w.y - WORM_RADIUS - 18);

            // HP bar
            const barW = 30;
            const barH = 4;
            const barX = w.x - barW / 2;
            const barY = w.y - WORM_RADIUS - 12;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
            const hpRatio = w.hp / w.maxHp;
            const hpColor = hpRatio > 0.5 ? '#4f4' : hpRatio > 0.25 ? '#ff4' : '#f44';
            ctx.fillStyle = hpColor;
            ctx.fillRect(barX, barY, barW * hpRatio, barH);

            // Aim indicator for active worm
            if (isActive) {
                // Aim line toward mouse
                const aimLen = 60;
                const aimEndX = w.x + Math.cos(aimAngle) * aimLen;
                const aimEndY = w.y + Math.sin(aimAngle) * aimLen;

                // Dotted aim line
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(w.x, w.y - 3);
                ctx.lineTo(aimEndX, aimEndY - 3);
                ctx.strokeStyle = mouseDown ? 'rgba(255, 100, 50, 0.9)' : 'rgba(255, 255, 0, 0.6)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.setLineDash([]);

                // Crosshair at aim end
                const chSize = mouseDown ? 8 : 5;
                ctx.strokeStyle = mouseDown ? '#ff6633' : '#ffff00';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(aimEndX - chSize, aimEndY - 3); ctx.lineTo(aimEndX + chSize, aimEndY - 3);
                ctx.moveTo(aimEndX, aimEndY - 3 - chSize); ctx.lineTo(aimEndX, aimEndY - 3 + chSize);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(aimEndX, aimEndY - 3, chSize * 0.7, 0, Math.PI * 2);
                ctx.stroke();

                // Active indicator (bouncing arrow)
                const bounce = Math.sin(performance.now() / 300) * 4;
                ctx.font = '16px serif';
                ctx.fillStyle = team.color;
                ctx.textAlign = 'center';
                ctx.fillText('▼', w.x, w.y - WORM_RADIUS - 28 + bounce);

                // Facing direction indicator
                ctx.font = '10px Courier New';
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fillText(facingDir > 0 ? '►' : '◄', w.x + facingDir * 20, w.y + 2);
            }
        }
    }

    // Floating texts
    for (const ft of floatingTexts) {
        const alpha = 1 - ft.timer / ft.maxTime;
        ctx.font = 'bold 16px Courier New';
        ctx.fillStyle = ft.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
        if (!ft.color.startsWith('rgba')) {
            ctx.globalAlpha = alpha;
            ctx.fillStyle = ft.color;
        }
        ctx.textAlign = 'center';
        ctx.fillText(ft.text, ft.x, ft.y);
        ctx.globalAlpha = 1;
    }

    // Move budget indicator
    if (gameState === 'aiming') {
        const worm = getActiveWorm();
        if (worm) {
            const remaining = Math.max(0, 1 - moveUsed / MOVE_BUDGET);
            const budgetBarW = 30;
            const budgetBarH = 3;
            const bx = worm.x - budgetBarW / 2;
            const by = worm.y + WORM_RADIUS + 6;
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(bx - 1, by - 1, budgetBarW + 2, budgetBarH + 2);
            ctx.fillStyle = `rgba(100, 200, 255, ${remaining > 0.1 ? 0.7 : 0.3})`;
            ctx.fillRect(bx, by, budgetBarW * remaining, budgetBarH);
        }
    }

    ctx.restore();

    // Wind visualization overlay (fixed position)
    if (Math.abs(wind) > 10) {
        const windDir = wind > 0 ? 1 : -1;
        const windStr = Math.abs(wind) / 200;
        ctx.globalAlpha = windStr * 0.15;
        for (let i = 0; i < 8; i++) {
            const wx = ((performance.now() / 10 * windDir + i * W / 8) % W + W) % W;
            const wy = H * 0.2 + (i * 47) % (H * 0.3);
            ctx.strokeStyle = '#aaccff';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(wx, wy);
            ctx.lineTo(wx + windDir * 30, wy);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;
    }
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
    const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
    lastTime = timestamp;
    update(dt);
    draw();
    requestAnimationFrame(gameLoop);
}

// ============================================================
// INIT
// ============================================================
function initGame() {
    document.getElementById('game-over').style.display = 'none';
    generateTerrain();
    renderTerrainTexture();
    createTeams();
    projectiles = [];
    explosions = [];
    floatingTexts = [];
    gameState = 'aiming';
    cameraPanX = 0;
    startTurn();
}

initGame();
lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
